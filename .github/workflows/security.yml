name: Security

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'   # weekly, Monday 06:00 UTC

permissions:
  contents: read

jobs:
  # ── Dependency vulnerability audit (root + verify_chess) ──
  npm-audit:
    name: npm audit (${{ matrix.dir }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: [ '.', 'verify_chess' ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      # Fails the build only on high/critical advisories; moderate/low are reported but non-blocking.
      - name: Audit dependencies
        working-directory: ${{ matrix.dir }}
        run: npm audit --audit-level=high

  # ── Static analysis of our JavaScript (XSS, injection, etc.) ──
  codeql:
    name: CodeQL (JavaScript)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          config-file: ./.github/codeql/codeql-config.yml
      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
